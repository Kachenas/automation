name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to deploy to"
        required: true
        type: choice
        options:
          - production
          - staging

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Static Site
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy assets to S3 (long cache)
        run: |
          # Sync from current directory (.) instead of dist/
          aws s3 sync . s3://${{ vars.S3_BUCKET_NAME }}/ \
            --delete \
            --cache-control "public, max-age=31536000, immutable" \
            --exclude "index.html" \
            --exclude "*.txt" \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude "*.md" \
            --exclude ".gitignore"

      - name: Deploy index.html and text files (no cache)
        run: |
          aws s3 sync . s3://${{ vars.S3_BUCKET_NAME }}/ \
            --cache-control "public, max-age=0, must-revalidate" \
            --exclude "*" \
            --include "index.html" \
            --include "*.txt" \
            --include "contact.html" \
            --include "error.html" \
            --include "header.html"

      - name: Deploy CSS files (long cache)
        run: |
          aws s3 sync css/ s3://${{ vars.S3_BUCKET_NAME }}/css/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Deploy JS files (long cache)
        run: |
          aws s3 sync js/ s3://${{ vars.S3_BUCKET_NAME }}/js/ \
            --cache-control "public, max-age=31536000, immutable" \
            --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          ENV_NAME="${{ github.event.inputs.environment || (github.ref_name == 'main' && 'production' || 'staging') }}"
          echo "### Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${ENV_NAME}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
