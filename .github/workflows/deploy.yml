name: Deploy to S3 + CloudFront

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy Static Site
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate static files exist
        run: |
          echo "Validating required files..."
          missing=0
          for f in index.html contact.html error.html header.html footer.html css/styles.css js/main.js; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              missing=1
            else
              echo "  Found: $f"
            fi
          done
          if [ "$missing" -eq 1 ]; then
            exit 1
          fi
          echo "All required files present."

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_IAM_ROLE }}
          aws-region: ${{ vars.AWS_REGION }}

      # Step 1: Sync all files to S3 with --delete to remove stale files.
      # --size-only avoids re-uploading unchanged files (timestamps always
      # differ on fresh checkout).
      - name: Sync all files to S3
        run: |
          aws s3 sync ./ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --delete \
            --size-only \
            --exclude ".git/*" \
            --exclude ".github/*" \
            --exclude ".gitignore" \
            --exclude ".vscode/*"

      # Step 2: Apply cache headers per file type.
      # HTML — short cache so users always get fresh content.
      - name: Set cache headers on HTML files
        run: |
          aws s3 cp s3://${{ vars.S3_BUCKET_NAME }}/ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --recursive \
            --exclude "*" \
            --include "*.html" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=0, must-revalidate" \
            --content-type "text/html"

      # CSS — 1-year cache (invalidated via CloudFront on deploy).
      - name: Set cache headers on CSS files
        run: |
          aws s3 cp s3://${{ vars.S3_BUCKET_NAME }}/ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --recursive \
            --exclude "*" \
            --include "*.css" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "text/css"

      # JS — 1-year cache (invalidated via CloudFront on deploy).
      - name: Set cache headers on JS files
        run: |
          aws s3 cp s3://${{ vars.S3_BUCKET_NAME }}/ s3://${{ vars.S3_BUCKET_NAME }}/ \
            --recursive \
            --exclude "*" \
            --include "*.js" \
            --metadata-directive REPLACE \
            --cache-control "public, max-age=31536000, immutable" \
            --content-type "application/javascript"

      # Step 3: Invalidate CloudFront.
      # /* is fine for a small site — a single wildcard invalidation is free.
      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"

      - name: Deployment summary
        run: |
          echo "### Deployment Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: production" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Files deployed**:" >> $GITHUB_STEP_SUMMARY
          find . -not -path './.git/*' -not -path './.github/*' -not -path './.vscode/*' -not -name '.gitignore' -type f | sort | while read f; do
            echo "  - ${f#./}" >> $GITHUB_STEP_SUMMARY
          done
