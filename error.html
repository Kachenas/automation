<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | NEXFLOW</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Outfit:wght@300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="h-full">
    <div
      id="app-wrapper"
      class="w-full h-full overflow-auto grid-bg flex flex-col"
      style="background-color: var(--bg-primary)"
    >
      <!-- NAV -->
      <nav
        class="fixed top-0 left-0 w-full z-50"
        style="
          background: rgba(6, 6, 14, 0.8);
          backdrop-filter: blur(20px);
          border-bottom: 1px solid rgba(79, 109, 245, 0.08);
        "
      >
        <div
          class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
        >
          <a href="index.html" class="flex items-center gap-2">
            <div
              class="w-8 h-8 rounded-lg flex items-center justify-center"
              style="background: linear-gradient(135deg, #4f6df5, #8b5cf6)"
            >
              <i
                data-lucide="zap"
                style="width: 18px; height: 18px; color: #fff"
              ></i>
            </div>
            <span
              class="font-mono-accent font-bold text-lg tracking-tight"
              style="color: #e2e4f0"
              >NEXFLOW</span
            >
          </a>
          <div
            class="hidden md:flex items-center gap-8 text-sm"
            style="color: rgba(226, 228, 240, 0.5)"
          >
            <a href="index.html#problems" class="hover:text-white transition-colors"
              >Problems</a
            >
            <a href="index.html#services" class="hover:text-white transition-colors"
              >Services</a
            >
            <a href="index.html#process" class="hover:text-white transition-colors"
              >Process</a
            >
            <a href="index.html#results" class="hover:text-white transition-colors"
              >Results</a
            >
            <a href="contact.html" class="hover:text-white transition-colors"
              >Contact</a
            >
          </div>
          <a
            href="contact.html"
            class="btn-primary px-5 py-2 rounded-full text-sm font-semibold text-white cursor-pointer hidden sm:inline-block"
            ><span>Get Started</span></a
          >
        </div>
      </nav>

      <!-- ERROR CONTENT -->
      <section
        class="flex-1 flex items-center justify-center relative overflow-hidden"
        style="padding-top: 80px"
      >
        <!-- Orbs -->
        <div
          class="hero-orb"
          style="
            width: 500px;
            height: 500px;
            background: rgba(79, 109, 245, 0.08);
            top: -100px;
            left: -150px;
          "
        ></div>
        <div
          class="hero-orb"
          style="
            width: 400px;
            height: 400px;
            background: rgba(139, 92, 246, 0.06);
            bottom: -100px;
            right: -100px;
            animation-delay: -3s;
          "
        ></div>

        <div class="text-center relative z-10 px-6">
          <!-- Glitching 404 -->
          <div class="error-code glitch-text font-mono-accent mb-4">404</div>

          <!-- Broken node visual -->
          <div class="flex justify-center mb-8">
            <svg viewBox="0 0 200 60" width="200" height="60">
              <line
                x1="20"
                y1="30"
                x2="80"
                y2="30"
                stroke="#4f6df5"
                stroke-width="1.5"
                class="line-flow"
                opacity="0.6"
              />
              <line
                x1="120"
                y1="30"
                x2="180"
                y2="30"
                stroke="#8b5cf6"
                stroke-width="1.5"
                stroke-dasharray="4 6"
                opacity="0.3"
              />
              <!-- Connected node -->
              <circle
                cx="20"
                cy="30"
                r="4"
                fill="#4f6df5"
                class="node-pulse"
              />
              <circle
                cx="80"
                cy="30"
                r="5"
                fill="#4f6df5"
                class="node-pulse"
                style="animation-delay: -1s"
              />
              <!-- Broken connection indicator -->
              <text
                x="100"
                y="35"
                text-anchor="middle"
                fill="rgba(139, 92, 246, 0.4)"
                font-size="16"
                font-family="'Space Mono', monospace"
              >
                //
              </text>
              <!-- Disconnected node -->
              <circle
                cx="120"
                cy="30"
                r="5"
                fill="none"
                stroke="#8b5cf6"
                stroke-width="1"
                opacity="0.3"
              />
              <circle
                cx="180"
                cy="30"
                r="4"
                fill="none"
                stroke="#8b5cf6"
                stroke-width="1"
                opacity="0.2"
              />
            </svg>
          </div>

          <h1
            class="text-2xl sm:text-3xl lg:text-4xl font-bold tracking-tight mb-4"
            style="color: #f0f1f7"
          >
            Connection Lost
          </h1>
          <p
            class="text-lg max-w-md mx-auto mb-10"
            style="color: rgba(226, 228, 240, 0.5)"
          >
            The page you're looking for doesn't exist or the workflow has been
            disconnected.
          </p>

          <div
            class="flex flex-col sm:flex-row gap-4 justify-center"
          >
            <a
              href="index.html"
              class="btn-primary px-8 py-4 rounded-full font-semibold text-white text-center cursor-pointer"
              ><span>Back to Home</span></a
            >
            <a
              href="contact.html"
              class="btn-outline px-8 py-4 rounded-full font-semibold text-center cursor-pointer"
              >Contact Support</a
            >
          </div>

          <p
            class="mt-8 text-xs font-mono-accent"
            style="color: rgba(79, 109, 245, 0.4)"
          >
            ERROR_CODE: NODE_NOT_FOUND // WORKFLOW_DISCONNECTED
          </p>
        </div>
      </section>

      <!-- FOOTER -->
      <footer
        class="w-full py-12"
        style="border-top: 1px solid rgba(79, 109, 245, 0.08)"
      >
        <div class="max-w-7xl mx-auto px-6">
          <div
            class="flex flex-col md:flex-row items-center justify-between gap-6"
          >
            <a href="index.html" class="flex items-center gap-2">
              <div
                class="w-7 h-7 rounded-md flex items-center justify-center"
                style="background: linear-gradient(135deg, #4f6df5, #8b5cf6)"
              >
                <i
                  data-lucide="zap"
                  style="width: 14px; height: 14px; color: #fff"
                ></i>
              </div>
              <span
                class="font-mono-accent font-bold text-sm"
                style="color: rgba(226, 228, 240, 0.6)"
                >NEXFLOW</span
              >
            </a>
            <div class="flex items-center gap-6">
              <a
                href="#"
                onclick="event.preventDefault()"
                style="color: rgba(226, 228, 240, 0.3)"
                class="hover:text-white transition-colors"
                ><i
                  data-lucide="twitter"
                  style="width: 18px; height: 18px"
                ></i
              ></a>
              <a
                href="#"
                onclick="event.preventDefault()"
                style="color: rgba(226, 228, 240, 0.3)"
                class="hover:text-white transition-colors"
                ><i
                  data-lucide="linkedin"
                  style="width: 18px; height: 18px"
                ></i
              ></a>
              <a
                href="#"
                onclick="event.preventDefault()"
                style="color: rgba(226, 228, 240, 0.3)"
                class="hover:text-white transition-colors"
                ><i
                  data-lucide="github"
                  style="width: 18px; height: 18px"
                ></i
              ></a>
              <a
                href="#"
                onclick="event.preventDefault()"
                style="color: rgba(226, 228, 240, 0.3)"
                class="hover:text-white transition-colors"
                ><i data-lucide="mail" style="width: 18px; height: 18px"></i
              ></a>
            </div>
            <p class="text-xs" style="color: rgba(226, 228, 240, 0.25)">
              &copy; 2025 Nexflow. All rights reserved.
            </p>
          </div>
        </div>
      </footer>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
