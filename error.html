<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 - Page Not Found | NEXFLOW</title>
    <script src="https://cdn.tailwindcss.com/3.4.17"></script>
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Outfit:wght@300;400;500;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body class="h-full">
    <div
      id="app-wrapper"
      class="w-full h-full overflow-auto grid-bg flex flex-col"
      style="background-color: var(--bg-primary)"
    >
      <div id="header-placeholder"></div>

      <!-- ERROR CONTENT -->
      <section
        class="flex-1 flex items-center justify-center relative overflow-hidden"
        style="padding-top: 80px"
      >
        <!-- Orbs -->
        <div
          class="hero-orb"
          style="
            width: 500px;
            height: 500px;
            background: rgba(var(--accent-1-rgb), 0.08);
            top: -100px;
            left: -150px;
          "
        ></div>
        <div
          class="hero-orb"
          style="
            width: 400px;
            height: 400px;
            background: rgba(var(--accent-2-rgb), 0.06);
            bottom: -100px;
            right: -100px;
            animation-delay: -3s;
          "
        ></div>

        <div class="text-center relative z-10 px-6">
          <!-- Glitching 404 -->
          <div class="error-code glitch-text font-mono-accent mb-4">404</div>

          <!-- Broken node visual -->
          <div class="flex justify-center mb-8">
            <svg viewBox="0 0 200 60" width="200" height="60">
              <line
                x1="20"
                y1="30"
                x2="80"
                y2="30"
                style="stroke: var(--accent-1)"
                stroke-width="1.5"
                class="line-flow"
                opacity="0.6"
              />
              <line
                x1="120"
                y1="30"
                x2="180"
                y2="30"
                style="stroke: var(--accent-2)"
                stroke-width="1.5"
                stroke-dasharray="4 6"
                opacity="0.3"
              />
              <!-- Connected node -->
              <circle
                cx="20"
                cy="30"
                r="4"
                style="fill: var(--accent-1)"
                class="node-pulse"
              />
              <circle
                cx="80"
                cy="30"
                r="5"
                style="fill: var(--accent-1); animation-delay: -1s"
                class="node-pulse"
              />
              <!-- Broken connection indicator -->
              <text
                x="100"
                y="35"
                text-anchor="middle"
                style="fill: rgba(var(--accent-2-rgb), 0.4)"
                font-size="16"
                font-family="'Space Mono', monospace"
              >
                //
              </text>
              <!-- Disconnected node -->
              <circle
                cx="120"
                cy="30"
                r="5"
                fill="none"
                style="stroke: var(--accent-2)"
                stroke-width="1"
                opacity="0.3"
              />
              <circle
                cx="180"
                cy="30"
                r="4"
                fill="none"
                style="stroke: var(--accent-2)"
                stroke-width="1"
                opacity="0.2"
              />
            </svg>
          </div>

          <h1
            class="text-2xl sm:text-3xl lg:text-4xl font-bold tracking-tight mb-4"
            style="color: var(--text-heading)"
          >
            Connection Lost
          </h1>
          <p
            class="text-lg max-w-md mx-auto mb-10"
            style="color: rgba(var(--text-rgb), 0.5)"
          >
            The page you're looking for doesn't exist or the workflow has been
            disconnected.
          </p>

          <div
            class="flex flex-col sm:flex-row gap-4 justify-center"
          >
            <a
              href="index.html"
              class="btn-primary px-8 py-4 rounded-full font-semibold text-white text-center cursor-pointer"
              ><span>Back to Home</span></a
            >
            <a
              href="contact.html"
              class="btn-outline px-8 py-4 rounded-full font-semibold text-center cursor-pointer"
              >Contact Support</a
            >
          </div>

          <p
            class="mt-8 text-xs font-mono-accent"
            style="color: rgba(var(--accent-1-rgb), 0.4)"
          >
            ERROR_CODE: NODE_NOT_FOUND // WORKFLOW_DISCONNECTED
          </p>
        </div>
      </section>

      <div id="footer-placeholder"></div>
    </div>
    <script src="js/main.js"></script>
  </body>
</html>
